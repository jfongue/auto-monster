<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Critter Brawl — Prototype Combat</title>
<style>
  :root{
    --bg:#0a0d18; --panel:#141a2e; --panel2:#1c2440; --line:#2a3357;
    --txt:#e9ecf7; --dim:#8b94bd; --acc:#5b7cff; --gold:#ffd24a; --green:#5fd99a; --red:#ff6b6b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:var(--bg);color:var(--txt);
    font-family:'Segoe UI',-apple-system,system-ui,sans-serif;overflow:hidden;user-select:none;}
  #app{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
  canvas{display:block;background:#10131f;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.6);}

  /* top HUD */
  #hud{position:absolute;top:0;left:0;right:0;height:54px;display:flex;align-items:center;
    justify-content:space-between;padding:0 22px;pointer-events:none;z-index:5;}
  #runbar{display:flex;gap:6px;align-items:center;}
  .node{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;
    font-size:13px;background:var(--panel);border:1px solid var(--line);color:var(--dim);}
  .node.cur{border-color:var(--acc);color:#fff;box-shadow:0 0 0 2px rgba(91,124,255,.35);}
  .node.done{background:var(--panel2);color:var(--green);}
  #title{font-weight:800;letter-spacing:1px;font-size:16px;
    background:linear-gradient(90deg,#7da0ff,#c89bff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #speedCtl{display:flex;gap:5px;pointer-events:auto;}
  #speedCtl button{padding:5px 11px;font-size:12px;}

  /* overlays */
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;background:rgba(7,9,16,.82);backdrop-filter:blur(4px);z-index:10;transition:opacity .25s;}
  .overlay.hidden{opacity:0;pointer-events:none;}
  h1{font-size:30px;letter-spacing:1px;}
  h2{font-size:17px;color:var(--dim);font-weight:600;}
  .sub{color:var(--dim);font-size:13px;text-align:center;max-width:560px;line-height:1.6;}

  button{font:inherit;font-weight:700;padding:12px 26px;border:none;border-radius:11px;cursor:pointer;
    background:linear-gradient(#5b7cff,#3f59d6);color:#fff;letter-spacing:.4px;
    transition:transform .1s,filter .1s,box-shadow .1s;}
  button:hover{filter:brightness(1.12);transform:translateY(-2px);box-shadow:0 8px 20px rgba(91,124,255,.3);}
  button.ghost{background:var(--panel2);}
  button:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none;}

  /* roster pick */
  .crit-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:880px;}
  .crit-card{width:158px;background:var(--panel);border:2px solid var(--line);border-radius:13px;
    padding:12px;cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s;}
  .crit-card:hover{transform:translateY(-4px);border-color:var(--acc);}
  .crit-card.sel{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold) inset,0 8px 22px rgba(255,210,74,.25);}
  .crit-card .cv-mini{width:100%;height:74px;display:block;}
  .crit-card .cn{font-weight:800;font-size:14px;margin:6px 0 2px;}
  .crit-card .badges{display:flex;flex-direction:column;gap:3px;margin-top:6px;}
  .badge{font-size:10.5px;display:flex;align-items:center;gap:5px;color:var(--dim);}
  .badge b{color:var(--txt);font-weight:600;}
  .dotc{width:9px;height:9px;border-radius:3px;flex:none;}

  /* perk cards */
  .perk-grid{display:flex;gap:16px;}
  .perk{width:230px;background:var(--panel);border:2px solid var(--line);border-radius:13px;
    padding:16px;cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s;}
  .perk:hover{transform:translateY(-5px);border-color:var(--acc);box-shadow:0 10px 26px rgba(91,124,255,.28);}
  .perk .pe-cre{font-size:12px;color:var(--dim);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .perk .pe-name{font-weight:800;font-size:16px;margin-bottom:8px;}
  .perk .pe-desc{font-size:12.5px;color:var(--dim);line-height:1.55;min-height:54px;}
  .branch-tag{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;
    padding:3px 9px;border-radius:7px;margin-bottom:10px;letter-spacing:.5px;}
  .b-off{background:#3a1f24;color:#ff8a8a;} .b-def{background:#1f2f3a;color:#7ec8ff;} .b-mys{background:#2f1f3a;color:#d79bff;}
  .spec-pips{display:flex;gap:4px;margin-top:8px;}
  .pip{width:16px;height:5px;border-radius:3px;background:var(--line);}
  .pip.on{background:var(--gold);}
  .branch-opt{background:#171c33;border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;margin-top:9px;cursor:pointer;transition:transform .1s,border-color .1s,background .1s;}
  .branch-opt:hover{border-color:var(--acc);background:#20264a;transform:translateX(3px);}
  .bo-name{font-weight:700;font-size:13.5px;margin:4px 0 3px;}
  .bo-desc{font-size:11px;color:var(--dim);line-height:1.45;}

  /* event */
  #eventBox{background:linear-gradient(#191f38,#10131f);border:1px solid var(--line);
    border-radius:16px;padding:30px 34px;max-width:520px;text-align:center;
    box-shadow:0 16px 50px rgba(0,0,0,.5);}
  #eventBox .ev-ic{font-size:46px;margin-bottom:10px;}
  #eventBox .ev-title{font-size:22px;font-weight:800;margin-bottom:12px;}
  #eventBox .ev-text{color:var(--dim);font-size:14px;line-height:1.7;margin-bottom:8px;}
  #eventBox .ev-eff{font-size:14px;font-weight:700;color:var(--gold);margin:14px 0 20px;}

  /* combat banner */
  #banner{position:absolute;top:46%;left:0;right:0;text-align:center;font-size:46px;font-weight:900;
    letter-spacing:3px;pointer-events:none;z-index:8;opacity:0;text-shadow:0 4px 24px rgba(0,0,0,.7);}
  #log{position:absolute;bottom:12px;left:14px;width:300px;font-size:12px;color:var(--dim);
    pointer-events:none;z-index:6;}
  #log div{opacity:0;animation:lin .35s forwards;}
  @keyframes lin{from{opacity:0;transform:translateX(-6px)}to{opacity:.85;transform:none}}
</style>
</head>
<body>
<div id="app">
  <canvas id="cv" width="980" height="560"></canvas>

  <div id="hud">
    <div id="title">CRITTER BRAWL</div>
    <div id="runbar"></div>
    <div id="speedCtl"></div>
  </div>

  <div id="banner"></div>
  <div id="log"></div>

  <!-- ROSTER PICK -->
  <div id="rosterScreen" class="overlay">
    <h1>Choisis ton équipe</h1>
    <p class="sub">Sélectionne 2 créatures. Chacune a un type d'attaque, un type de défense et un effet spécial.</p>
    <div class="crit-grid" id="critGrid"></div>
    <button id="startBtn" disabled>Commencer l'aventure</button>
  </div>

  <!-- PERK -->
  <div id="perkScreen" class="overlay hidden">
    <h1>🌟 Spécialisation</h1>
    <p class="sub">Améliore l'un de tes deux monstres : renforce son attaque, sa défense ou son effet spécial.</p>
    <div class="perk-grid" id="perkGrid"></div>
  </div>

  <!-- EVENT -->
  <div id="eventScreen" class="overlay hidden">
    <div id="eventBox"></div>
  </div>

  <!-- RESULT -->
  <div id="resultScreen" class="overlay hidden">
    <div id="resultTxt"></div>
    <button id="replayBtn">Nouvelle aventure</button>
  </div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height;
let gx=ctx; // drawing target for creature bodies (swappable for mini previews)

/* ====================== TYPES ====================== */
const ATK={
  hit:      {name:'Frappe',      ic:'👊', c:'#ff8a5a', desc:'Coups de mêlée rapprochés.'},
  ranged:   {name:'Distance',    ic:'🎯', c:'#7ec8ff', desc:'Projectiles à distance, pas de contre.'},
  lifesteal:{name:'Vol de vie',  ic:'🩸', c:'#ff6b9d', desc:'Se soigne d\'une partie des dégâts.'},
  double:   {name:'Double',      ic:'⚡', c:'#ffd24a', desc:'Frappe deux fois par assaut.'},
  poison:   {name:'Venin',       ic:'🟢', c:'#8ee06a', desc:'Inflige des dégâts sur la durée.'},
};
const DEF={
  dodge:  {name:'Esquive',  ic:'💨', c:'#7ad9d9', desc:'Chance d\'éviter totalement.'},
  shield: {name:'Bouclier', ic:'🛡️', c:'#9ab4ff', desc:'Absorbe une partie des dégâts.'},
  debuff: {name:'Affaiblir',ic:'🔻', c:'#c89bff', desc:'Réduit l\'attaque de l\'agresseur.'},
  riposte:{name:'Riposte',  ic:'�549', c:'#ffb24a', desc:'Renvoie des dégâts en bloquant.'},
};
const SPE={
  frenzy: {name:'Frénésie',     ic:'🔥', c:'#ff6b6b', desc:'Dégâts accrus sous 40% PV.'},
  regen:  {name:'Régénération', ic:'🌿', c:'#5fd99a', desc:'Récupère des PV à chaque assaut.'},
  summon: {name:'Invocation',   ic:'🐣', c:'#ffd24a', desc:'Invoque un familier qui frappe.'},
  boost:  {name:'Boost',        ic:'✨', c:'#9ab4ff', desc:'Augmente vitesse & dégâts un moment.'},
};
// fix riposte icon
DEF.riposte.ic='⚔️';

/* ====================== CRÉATURES (planche de sprites) ====================== */
// id = nom du fichier sprite attendu dans sprites/<id>.png  (sinon dessin de secours via arch)
const DEX=[
  {id:'leafkit',  name:'Leafkit',   arch:'quad', col:'#6fae54',ac:'#cfe6a8',hp:95, atk:16,def:4,spd:1.35,atk_t:'double',  def_t:'dodge',  spe_t:'regen', desc:'Aime la forêt.'},
  {id:'flameling',name:'Flameling', arch:'quad', col:'#e0532a',ac:'#f5a623',hp:110,atk:18,def:5,spd:1.05,atk_t:'hit',     def_t:'riposte',spe_t:'frenzy',desc:'Esprit ardent.'},
  {id:'aquafi',   name:'Aquafi',    arch:'blob', col:'#4aa3d9',ac:'#bfe6f5',hp:105,atk:15,def:4,spd:1.20,atk_t:'ranged',  def_t:'dodge',  spe_t:'regen', desc:'Joueur dans l\'eau.'},
  {id:'mossprout',name:'Mossprout', arch:'golem',col:'#8fb35a',ac:'#d8e6b0',hp:125,atk:15,def:7,spd:0.95,atk_t:'lifesteal',def_t:'shield',spe_t:'regen', desc:'Répand des graines.'},
  {id:'peblix',   name:'Peblix',    arch:'golem',col:'#6b6e76',ac:'#b08d5a',hp:150,atk:16,def:8,spd:0.80,atk_t:'hit',     def_t:'shield', spe_t:'summon',desc:'Coquille protectrice.'},
  {id:'willowisp',name:'Willowisp', arch:'blob', col:'#7a5ea8',ac:'#b9a3e0',hp:95, atk:16,def:3,spd:1.15,atk_t:'ranged',  def_t:'debuff', spe_t:'summon',desc:'Vacille dans le noir.'},
  {id:'chirple',  name:'Chirple',   arch:'bird', col:'#d6b88a',ac:'#c0552f',hp:90, atk:15,def:3,spd:1.40,atk_t:'double',  def_t:'dodge',  spe_t:'boost', desc:'Chant plein d\'énergie.'},
  {id:'nimbus',   name:'Nimbus',    arch:'bird', col:'#9cc4e8',ac:'#e8f4ff',hp:100,atk:15,def:3,spd:1.30,atk_t:'ranged',  def_t:'dodge',  spe_t:'boost', desc:'Dérive dans le ciel.'},
];

// sens naturel du sprite source (+1 = regarde à droite, -1 = à gauche)
const FACE={leafkit:1,flameling:1,aquafi:1,mossprout:1,peblix:-1,willowisp:1,chirple:-1,nimbus:1};

// ---- chargement des sprites image (transparents) ----
const SPRITES={}, SHADOWS={};
DEX.forEach(d=>{ const img=new Image(); img.onload=()=>{img._ok=true;}; img.src='sprites/'+d.id+'.png'; SPRITES[d.id]=img; });
function spriteReady(id){ const s=SPRITES[id]; return s&&s._ok&&s.naturalWidth>0; }
// version "ombre" (silhouette sombre) pour les ennemis, générée une fois
function shadowSprite(id){
  if(SHADOWS[id]) return SHADOWS[id];
  if(!spriteReady(id)) return null;
  const img=SPRITES[id], cnv=document.createElement('canvas');
  cnv.width=img.naturalWidth; cnv.height=img.naturalHeight;
  const g=cnv.getContext('2d'); g.drawImage(img,0,0);
  g.globalCompositeOperation='source-atop'; g.fillStyle='#322b4d'; g.fillRect(0,0,cnv.width,cnv.height);
  g.globalCompositeOperation='source-over'; SHADOWS[id]=cnv; return cnv;
}

/* ====================== STATE ====================== */
let roster=[];           // chosen creatures (run-persistent objects)
let player=[],enemy=[],all=[],summons=[];
let state='roster';
let speed=1, timeScale=1, targetScale=1;
let hitPause=0, shake=0;
let particles=[], floaters=[];
let cam={zoom:1,cx:W/2,cy:H/2, tz:1,tx:W/2,ty:H/2};
let nodeIdx=0;
let activeAttacker=null; // un seul assaut à la fois (rythme assaut par assaut)
const RUN=[ // séquence de l'aventure
  {t:'combat',lv:1}, {t:'perk'}, {t:'event'},
  {t:'combat',lv:2}, {t:'perk'}, {t:'event'},
  {t:'combat',lv:3,boss:true}, {t:'perk'},
  {t:'combat',lv:4,boss:true,final:true},
];

/* ====================== INSTANCE ====================== */
function inst(def, side, slot){
  const c={
    def, name:def.name, arch:def.arch, col:def.col, ac:def.ac,
    maxHp:def.hp, hp:def.hp, atk:def.atk, basedef:def.def, spd:def.spd,
    atk_t:def.atk_t, def_t:def.def_t, spe_t:def.spe_t,
    spec:{off:0,def:0,mys:0},        // niveaux de spécialisation
    side, slot, facing:side==='L'?1:-1,
    gauge:0, anim:'idle', animT:0, t:Math.random()*9,
    flash:0, scaleX:1, scaleY:1, x:0,y:0, baseX:0, baseY:0,
    shieldHp:0, dotT:0, dot:0, boostT:0, debuffT:0,
    alive:true, deadT:0, target:null, isSummon:false,
  };
  return c;
}
// derived helpers
function eff_atk(c){ let a=c.atk*(1+c.spec.off*0.2);
  if(c.boostT>0)a*=1.3;
  if(c.debuffT>0)a*=0.7;
  if(c.spe_t==='frenzy'&&c.hp<c.maxHp*0.4) a*=1.5+c.spec.mys*0.15;
  return a; }
function eff_def(c){ return c.basedef*(1+c.spec.def*0.25); }
function dodgeChance(c){ return c.def_t==='dodge' ? 0.30+c.spec.def*0.10 : 0; }
function riposteChance(c){ return c.def_t==='riposte' ? 0.35+c.spec.def*0.10 : 0; }

/* ====================== POSITIONS ====================== */
function slotsFor(n){ // positions Y centrées pour n unités (2v2 → 2 lignes)
  const gap=150, top=H/2+40-(n-1)*gap/2;
  return Array.from({length:n},(_, i)=>top+i*gap);
}
function layout(){
  const ys=slotsFor(player.length);
  player.forEach((c,i)=>{c.baseX=255;c.baseY=ys[i];c.x=c.baseX;c.y=c.baseY;c.slot=i;});
  const ye=slotsFor(enemy.length);
  enemy.forEach((c,i)=>{c.baseX=W-255;c.baseY=ye[i];c.x=c.baseX;c.y=c.baseY;c.slot=i;});
}

/* ====================== SETUP ENCOUNTER ====================== */
function setupCombat(node){
  player=roster; // pas de mort permanente : on réanime entre les combats
  player.forEach(c=>{
    if(c.alive===false){ c.alive=true; c.hp=Math.round(c.maxHp*0.45); }      // réanimation
    else c.hp=Math.min(c.hp+Math.round(c.maxHp*0.35),c.maxHp);               // soin partiel
    c.side='L';c.facing=1;c.gauge=0;c.anim='idle';c.animT=0;c.deadT=0;
    c.shieldHp=0;c.boostT=0;c.debuffT=0;c.dot=0;c.dotT=0;c.scaleX=1;c.scaleY=1;
  });
  // enemies scaled by level (2v2)
  const lv=node.lv, n=2;
  enemy=[];
  const pool=[...DEX].sort(()=>Math.random()-0.5);
  for(let i=0;i<n;i++){
    const e=inst(pool[i%pool.length],'R',i);
    const hpM=0.84+lv*0.06, atkM=0.86+lv*0.04; // courbe douce, joueur avantagé tôt
    e.maxHp=Math.round(e.maxHp*hpM); e.hp=e.maxHp; e.atk=Math.round(e.atk*atkM);
    if(node.boss && i===0){ const bm=node.final?1.45:1.25, ba=node.final?1.12:1.05;
      e.name='👑 '+e.name; e.maxHp=Math.round(e.maxHp*bm); e.hp=e.maxHp; e.atk=Math.round(e.atk*ba); e.scaleBig=node.final?1.4:1.25; }
    enemy.push(e);
  }
  summons=[];
  all=[...player,...enemy];
  activeAttacker=null;
  layout();
  state='fight';
  banner(node.final?'COMBAT FINAL':node.boss?'BOSS':'COMBAT',node.boss?'#ffd24a':'#7da0ff');
  log('⚔️ Un combat commence !');
}

/* ====================== COMBAT LOGIC ====================== */
function foesOf(c){ const arr=(c.side==='L'?enemy:player).concat(summons.filter(s=>s.side!==c.side)); return arr.filter(e=>e.alive); }

function startAssault(att){
  const foes=foesOf(att); if(!foes.length)return;
  att.target=foes[Math.floor(Math.random()*foes.length)];
  att.anim='prep'; att.animT=0; att.struck=false;
}
function isRanged(c){ return c.atk_t==='ranged'||c.atk_t==='poison'; }
function doStrike(c){ if(isRanged(c)) spawnProjectile(c,c.target); else resolveStrike(c); }

function applyDamage(tgt, raw, opts={}){
  if(!tgt.alive)return 0;
  const att=opts.att, ranged=opts.ranged, pure=opts.pure;
  // dodge
  if(!pure && Math.random()<dodgeChance(tgt)){
    floater(tgt,'ESQUIVE','dodge'); tgt.anim='dodge';tgt.animT=0; log(`${tgt.name} esquive !`); return 0;
  }
  // riposte (not vs ranged)
  if(!pure && !ranged && att && Math.random()<riposteChance(tgt)){
    floater(tgt,'PARADE','parry'); tgt.flash=1; spawnP((att.x+tgt.x)/2,(att.y+tgt.y)/2,'#ffb24a',9);
    log(`${tgt.name} riposte !`);
    const back=Math.max(3,Math.round(eff_atk(tgt)*0.5)); applyDamage(att, back,{pure:true}); return 0;
  }
  // debuff defense
  if(!pure && att && tgt.def_t==='debuff' && Math.random()<0.4){
    att.debuffT=2600; floater(att,'AFFAIBLI','debuff');
  }
  let dmg=raw*1.55; // coups percutants
  if(!pure) dmg=Math.max(2, dmg-eff_def(tgt));
  // shield absorb
  if(tgt.def_t==='shield'){ const sh=Math.round(dmg*(0.35+tgt.spec.def*0.08)); dmg-=sh; floater(tgt,'🛡 BLOCK','block'); }
  dmg=Math.max(1,Math.round(dmg*(0.88+Math.random()*0.24)));
  tgt.hp-=dmg; tgt.flash=1; tgt.anim='hurt'; tgt.animT=0;
  tgt.x+=(tgt.side==='L'?-1:1)*7;
  floater(tgt,'-'+dmg, opts.big?'crit':'dmg');
  spawnP(tgt.x,tgt.y-28, opts.color||'#ff5a5a', opts.big?16:10);
  spawnRing(tgt.x,tgt.y-26, opts.color||'#fff', opts.big);
  hitPause=opts.big?7:5; shake=opts.big?12:7;
  if(tgt.hp<=0){ tgt.hp=0; tgt.alive=false; tgt.anim='die'; tgt.deadT=0; log(`💀 ${tgt.name} tombe !`); }
  return dmg;
}

function resolveStrike(att){
  const tgt=att.target; if(!tgt||!tgt.alive)return;
  const ranged=att.atk_t==='ranged'||att.atk_t==='poison';
  let dmg=eff_atk(att);
  const dealt=applyDamage(tgt,dmg,{att,ranged,color:ATK[att.atk_t].c});
  if(dealt>0){
    if(att.atk_t==='lifesteal'){ const h=Math.round(dealt*(0.4+att.spec.off*0.08)); att.hp=Math.min(att.maxHp,att.hp+h); floater(att,'+'+h,'heal'); }
    if(att.atk_t==='poison'){ tgt.dot=Math.round(eff_atk(att)*0.25); tgt.dotT=3000; floater(tgt,'POISON','poison'); }
  }
  if(att.atk_t==='double'){ const extra=1+ (att.spec.off>=2?1:0);
    for(let k=0;k<extra;k++) setTimeout(()=>{ if(att.target&&att.target.alive)applyDamage(att.target,eff_atk(att)*0.7,{att,ranged,color:'#ffd24a'}); },110+k*90); }
}

// special effect triggers when gauge completes (random)
function maybeSpecial(c){
  const chance=0.22+c.spec.mys*0.10;
  if(Math.random()>chance)return false;
  c.anim='cast'; c.animT=0; // occupe le tour, animation visible
  if(c.spe_t==='regen'){ const h=Math.round(c.maxHp*(0.12+c.spec.mys*0.04)); c.hp=Math.min(c.maxHp,c.hp+h); floater(c,'+'+h,'heal'); spawnP(c.x,c.y-20,'#5fd99a',10); log(`${c.name} régénère.`); }
  else if(c.spe_t==='boost'){ c.boostT=3200; floater(c,'BOOST','special'); spawnP(c.x,c.y-20,'#9ab4ff',12); log(`${c.name} se renforce !`); }
  else if(c.spe_t==='frenzy'){ c.hp=Math.max(1,c.hp-Math.round(c.maxHp*0.05)); c.boostT=2600; floater(c,'FRÉNÉSIE','fire'); spawnP(c.x,c.y-20,'#ff6b6b',12); }
  else if(c.spe_t==='summon'){ summonFamiliar(c); }
  return true;
}
function summonFamiliar(c){
  if(summons.filter(s=>s.owner===c).length>=1)return;
  const f=inst(c.def,c.side,0); f.isSummon=true; f.owner=c; f.name='familier';
  f.maxHp=f.hp=Math.round(c.maxHp*0.3); f.atk=Math.round(c.atk*0.5); f.spd=1.2; f.spe_t=null; f.def_t='none';
  f.scaleBig=0.55; f.baseX=c.baseX+(c.side==='L'?40:-40); f.baseY=c.baseY+50; f.x=f.baseX;f.y=f.baseY;
  summons.push(f); all.push(f); floater(c,'INVOCATION','special'); log(`${c.name} invoque un familier !`);
}

/* ====================== UPDATE ====================== */
let last=performance.now();
function update(rawDt){
  // ease timescale (slow-mo) — pas de mouvement de caméra
  timeScale+=(targetScale-timeScale)*0.18;

  if(state!=='fight'){ updateFx(rawDt); return; }
  const dt=rawDt*timeScale;
  if(hitPause>0){ hitPause-=1; updateFx(rawDt); return; }

  // un seul assaut à la fois ; libère l'attaquant quand il a fini
  if(activeAttacker && (!activeAttacker.alive || activeAttacker.anim==='idle')) activeAttacker=null;

  // slow-mo seulement sur l'amorce du coup
  if(activeAttacker && activeAttacker.anim==='charge') targetScale=0.22;
  else if(activeAttacker && activeAttacker.anim==='hit') targetScale=0.55;
  else targetScale=1;

  // timers (tous)
  all.forEach(c=>{
    c.t+=rawDt*0.005;
    if(c.flash>0)c.flash=Math.max(0,c.flash-rawDt*0.006);
    if(c.boostT>0)c.boostT-=dt; if(c.debuffT>0)c.debuffT-=dt;
    if(!c.alive){c.deadT+=rawDt;return;}
    c.animT+=dt;
    if(c.dotT>0){ c.dotT-=dt; if(Math.floor((c.dotT+dt)/600)!==Math.floor(c.dotT/600)){ c.hp-=c.dot; floater(c,'-'+c.dot,'poison'); if(c.hp<=0){c.hp=0;c.alive=false;c.anim='die';c.deadT=0;} } }
  });

  // remplissage des jauges seulement si aucun assaut en cours
  if(!activeAttacker){
    let ready=null, best=99.999;
    all.forEach(c=>{ if(c.alive&&c.anim==='idle'){ c.gauge+=c.spd*dt*0.055; if(c.gauge>=100&&c.gauge>best){best=c.gauge;ready=c;} } });
    if(ready){ ready.gauge=0; activeAttacker=ready; if(!maybeSpecial(ready)) startAssault(ready); }
  }

  // animations pour tout ce qui bouge (attaquant + victimes en hurt/dodge)
  all.forEach(c=>{ if(c.alive&&c.anim!=='idle') stepAnim(c,dt); });

  if(!player.some(c=>c.alive)) endCombat(false);
  else if(!enemy.some(c=>c.alive)) endCombat(true);

  updateFx(rawDt);
}

function stepAnim(c,dt){
  const tgt=c.target;
  const ranged=isRanged(c);
  switch(c.anim){
    case 'prep':{ // animation sur place (anticipation), pas de déplacement
      const p=Math.min(1,c.animT/260), s=Math.sin(p*Math.PI);
      c.scaleX=1+0.14*s; c.scaleY=1-0.12*s;
      c.x=c.baseX - c.facing*10*s; // petit recul d'élan
      if(c.animT>140){ c.animT=0; c.scaleX=1;c.scaleY=1; c.anim=ranged?'set':'travel'; }
      break; }
    case 'travel':{ // glisse vers la cible (diagonale : x ET y)
      if(!tgt||!tgt.alive){c.anim='back';c.animT=0;break;}
      const dx=tgt.x-c.facing*52, dy=tgt.y;
      const k=Math.min(1,dt*0.05);
      c.x+=(dx-c.x)*k; c.y+=(dy-c.y)*k; c.scaleX=1.1;c.scaleY=0.92;
      if(Math.abs(c.x-dx)<8&&Math.abs(c.y-dy)<8){ c.x=dx;c.y=dy; c.anim='set'; c.animT=0; }
      break; }
    case 'set': // petite pause avant le coup
      c.scaleX+=(1-c.scaleX)*0.3; c.scaleY+=(1-c.scaleY)*0.3;
      if(c.animT>60){ c.anim='charge'; c.animT=0; }
      break;
    case 'charge':{ // amorce du coup (slow-mo géré dans update)
      const p=Math.min(1,c.animT/170), s=Math.sin(p*Math.PI*0.5);
      c.scaleX=1-0.13*s; c.scaleY=1+0.18*s; // ramassé prêt à frapper
      if(c.animT>170){ c.anim='hit'; c.animT=0; c.struck=false; }
      break; }
    case 'hit': // le coup part
      if(!c.struck){ c.struck=true; doStrike(c); }
      c.scaleX=1.3; c.scaleY=0.74;
      c.x = (ranged?c.baseX:c.x) + (ranged?0:c.facing*7);
      if(c.animT>100){ c.anim='recover'; c.animT=0; }
      break;
    case 'recover': // petite pause après
      c.scaleX+=(1-c.scaleX)*0.28; c.scaleY+=(1-c.scaleY)*0.28;
      if(c.animT>60){ c.anim='back'; c.animT=0; }
      break;
    case 'back': // retour à la position
      c.x+=(c.baseX-c.x)*Math.min(1,dt*0.04); c.y+=(c.baseY-c.y)*Math.min(1,dt*0.04);
      c.scaleX+=(1-c.scaleX)*0.2; c.scaleY+=(1-c.scaleY)*0.2;
      if(Math.abs(c.x-c.baseX)<4&&Math.abs(c.y-c.baseY)<4){ c.x=c.baseX;c.y=c.baseY; c.anim='idle'; c.animT=0; }
      break;
    case 'hurt':
      c.scaleX+=(1-c.scaleX)*0.2;c.scaleY+=(1-c.scaleY)*0.2;c.x+=(c.baseX-c.x)*0.14;
      if(c.animT>200){ c.x=c.baseX; c.anim='idle'; } // si riposté, l'assaut s'interrompt
      break;
    case 'dodge':
      c.y=c.baseY-Math.sin(Math.min(1,c.animT/250)*Math.PI)*26;
      if(c.animT>250){c.y=c.baseY;c.anim='idle';}
      break;
    case 'cast':{
      const p=Math.min(1,c.animT/450);
      const pulse=Math.sin(p*Math.PI);
      c.scaleX=1+0.2*pulse; c.scaleY=1+0.22*pulse; c.y=c.baseY-pulse*10;
      if(c.animT>450){ c.scaleX=1;c.scaleY=1;c.y=c.baseY;c.anim='idle'; }
      break; }
  }
}

let projectiles=[];
function spawnProjectile(att,tgt){
  if(!tgt)return;
  projectiles.push({x:att.x+att.facing*30,y:att.y-10,tx:tgt.x,ty:tgt.y-10,att,tgt,c:ATK[att.atk_t].c,t:0});
}

function updateFx(rawDt){
  const dt=rawDt*timeScale;
  if(shake>0)shake=Math.max(0,shake-rawDt*0.04);
  particles.forEach(p=>{p.x+=p.vx*timeScale;p.y+=p.vy*timeScale;p.vy+=0.35*timeScale;p.life-=rawDt*0.004;});
  particles=particles.filter(p=>p.life>0);
  floaters.forEach(f=>{f.t+=rawDt;f.y-=rawDt*0.03;});
  floaters=floaters.filter(f=>f.t<850);
  rings.forEach(r=>{ r.t+=rawDt*0.004; });
  rings=rings.filter(r=>r.t<r.max);
  projectiles.forEach(p=>{ p.t+=dt*0.006;
    p.x+=(p.tx-p.x)*Math.min(1,dt*0.02); p.y+=(p.ty-p.y)*Math.min(1,dt*0.02);
    if(Math.hypot(p.tx-p.x,p.ty-p.y)<14 && !p.done){ p.done=true;
      applyDamage(p.tgt,eff_atk(p.att),{att:p.att,ranged:true,color:p.c});
      if(p.att.atk_t==='poison'&&p.tgt.alive){p.tgt.dot=Math.round(eff_atk(p.att)*0.25);p.tgt.dotT=3000;}
      spawnP(p.x,p.y,p.c,10);
    }
  });
  projectiles=projectiles.filter(p=>!p.done);
}

const FK={dmg:['#d23b32','#fff'],crit:['#ff4d4d','#fff'],heal:['#2fa869','#eafff2'],
  dodge:['#159a9a','#eafffb'],block:['#3a6fd0','#eef4ff'],parry:['#c9a01c','#241a06'],
  poison:['#6aa83a','#f3ffe2'],debuff:['#8b5fc0','#f6eeff'],special:['#5b7cff','#fff'],fire:['#e0532a','#fff']};
function floater(c,text,kind){ const s=FK[kind]||FK.dmg; floaters.push({x:c.x+(Math.random()*14-7),y:c.y-56,text,bg:s[0],fg:s[1],t:0,big:(kind==='crit'||kind==='special'||kind==='fire')}); }
function spawnP(x,y,color,n){for(let i=0;i<n;i++){const a=Math.random()*7,s=1+Math.random()*4;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,color,r:2+Math.random()*3});}}
let rings=[];
function spawnRing(x,y,color,big){ rings.push({x,y,color,t:0,max:big?1:0.7}); }

/* ====================== END / FLOW ====================== */
function endCombat(win){
  if(state!=='fight')return;
  state='postcombat';
  banner(win?'VICTOIRE':'DÉFAITE', win?'#5fd99a':'#ff6b6b');
  if(!win){ setTimeout(()=>showResult(false),1300); return; }
  setTimeout(()=>{ nodeIdx++; nextNode(); },1500);
}
function nextNode(){
  const node=RUN[nodeIdx];
  renderRunbar();
  if(!node){ showResult(true); return; }
  if(node.t==='combat') setupCombat(node);
  else if(node.t==='perk') showPerk();
  else if(node.t==='event') showEvent();
}

const PERKDESC={
  off:c=>`Attaque +20%. ${c.spec.off>=1?'Renforce '+ATK[c.atk_t].name.toLowerCase()+'.':''}`,
  def:c=>`Défense +25%, PV max +8%. Renforce ${DEF[c.def_t].name.toLowerCase()}.`,
  mys:c=>`Effet « ${SPE[c.spe_t].name} » plus fréquent et plus puissant.`,
};
const BRANCHES=[['off','Offensif','b-off','Affûtage'],['def','Défensif','b-def','Carapace'],['mys','Mystique','b-mys','Éveil']];
function showPerk(){
  const ps=document.getElementById('perkScreen'), grid=document.getElementById('perkGrid');
  grid.innerHTML='';
  // une carte par monstre : on améliore SOIT l'un SOIT l'autre
  roster.filter(c=>c.alive!==false).forEach(c=>{
    const card=document.createElement('div'); card.className='perk';
    let html=`<div class="pe-cre" style="margin-bottom:4px"><span class="dotc" style="background:${c.col}"></span><b style="color:#fff;font-size:15px">${c.name}</b></div>`;
    BRANCHES.forEach(([b,bn,bc,nm])=>{
      const ic=b==='off'?ATK[c.atk_t].ic:b==='def'?DEF[c.def_t].ic:SPE[c.spe_t].ic;
      const maxed=c.spec[b]>=3;
      html+=`<div class="branch-opt" data-b="${b}" ${maxed?'style="opacity:.45;pointer-events:none"':''}>
        <div class="branch-tag ${bc}">${bn}${maxed?' · MAX':''}</div>
        <div class="bo-name">${ic} ${nm}</div>
        <div class="bo-desc">${PERKDESC[b](c)}</div>
        <div class="spec-pips">${[0,1,2].map(k=>`<div class="pip ${k<c.spec[b]?'on':''}"></div>`).join('')}</div>
      </div>`;
    });
    card.innerHTML=html;
    card.querySelectorAll('.branch-opt').forEach(opt=>{
      opt.onclick=()=>{
        const b=opt.dataset.b; c.spec[b]=Math.min(3,c.spec[b]+1);
        if(b==='def') c.maxHp=Math.round(c.maxHp*1.08);
        c.hp=c.maxHp;
        ps.classList.add('hidden'); nodeIdx++; nextNode();
      };
    });
    grid.appendChild(card);
  });
  ps.classList.remove('hidden');
}

function banner(text,color){

  b.style.transition='none'; b.style.opacity='1'; b.style.transform='scale(1.15)';

function log(msg){const el=document.getElementById('log');const d=document.createElement('div');d.textContent=msg;el.prepend(d);while(el.childNodes.length>6)el.removeChild(el.lastChild);}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake>0)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);

  drawArena();
  const drawn=[...all].filter(c=>c.alive||c.deadT<500).sort((a,b)=>a.y-b.y);
  drawn.forEach(drawCritter);

  // projectiles
  projectiles.forEach(p=>{ ctx.fillStyle=p.c; ctx.shadowColor=p.c; ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(p.x,p.y,7,0,7);ctx.fill(); ctx.shadowBlur=0; });

  // anneaux d'impact
  rings.forEach(r=>{ const p=r.t/r.max; ctx.globalAlpha=Math.max(0,1-p);
    ctx.strokeStyle=r.color; ctx.lineWidth=4*(1-p)+1;
    ctx.beginPath();ctx.arc(r.x,r.y,8+p*46,0,7);ctx.stroke(); });
  ctx.globalAlpha=1;
  particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();});
  ctx.globalAlpha=1;
  floaters.forEach(f=>{
    const a=Math.max(0,1-f.t/850); const pop=f.t<120?f.t/120:1; const sc=(f.big?1.12:1)*(0.6+0.4*pop);
    ctx.globalAlpha=a; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`800 ${f.big?17:14}px system-ui`;
    const w=ctx.measureText(f.text).width+18, h=f.big?24:21;
    ctx.save(); ctx.translate(f.x,f.y); ctx.scale(sc,sc);
    ctx.fillStyle=f.bg; ctx.strokeStyle='rgba(0,0,0,.55)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.roundRect(-w/2,-h/2,w,h,h/2); ctx.fill(); ctx.stroke();
    ctx.fillStyle=f.fg; ctx.fillText(f.text,0,1);
    ctx.restore();
  });
  ctx.textBaseline='alphabetic'; ctx.globalAlpha=1;

  // slowmo vignette
  ctx.restore();
  if(timeScale<0.7){ ctx.save(); ctx.globalAlpha=(0.7-timeScale)*0.5;
    const g=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.75);
    g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,1)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.restore(); }
}

function drawArena(){
  ctx.fillStyle='#0e1322'; ctx.fillRect(0,0,W,H);
  // floor
  const fg=ctx.createLinearGradient(0,H*0.5,0,H); fg.addColorStop(0,'#1b2238');fg.addColorStop(1,'#10131f');
  ctx.fillStyle=fg; ctx.beginPath(); ctx.moveTo(0,H*0.46); ctx.lineTo(W,H*0.46); ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.fill();
  // arena oval
  ctx.strokeStyle='rgba(120,150,230,.12)';ctx.lineWidth=3;
  ctx.beginPath();ctx.ellipse(W/2,H*0.72,W*0.42,H*0.26,0,0,7);ctx.stroke();
  // center divider glow
  ctx.fillStyle='rgba(91,124,255,.05)';ctx.fillRect(W/2-1,H*0.46,2,H*0.5);
}

function drawShadow(c){
  ctx.save(); ctx.globalAlpha=(c.alive?0.32:0.32*Math.max(0,1-c.deadT/500));
  const sb=(c.scaleBig||1); ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(c.x,c.baseY+38*sb,30*sb*c.scaleX,9*sb,0,0,7);ctx.fill();ctx.restore();
}

const SPRITE_H=120; // hauteur d'affichage cible des sprites image
function drawCritter(c){
  ctx.save();
  let alpha=1,yoff=0,rot=0;
  if(!c.alive){const t=Math.min(1,c.deadT/500);alpha=1-t;yoff=t*26;rot=t*(c.side==='L'?-0.5:0.5);}
  ctx.globalAlpha=alpha;
  const sb=c.scaleBig||1;
  const bob=c.alive&&c.anim==='idle'?Math.sin(c.t*2)*3:0;
  const sid=c.def&&c.def.id;
  const ready=sid&&spriteReady(sid);
  // flip : oriente le sprite vers l'adversaire selon son sens naturel
  const flip = ready ? c.facing*(FACE[sid]||1) : c.facing;
  ctx.translate(c.x,c.y+yoff+bob); ctx.rotate(rot); ctx.scale(flip*c.scaleX*sb,c.scaleY*sb);
  if(ready){
    const enemy_=(c.side==='R'&&!c.isSummon);
    const img = enemy_ ? (shadowSprite(sid)||SPRITES[sid]) : SPRITES[sid];
    const sc=SPRITE_H/img.height, w=img.width*sc, h=img.height*sc;
    ctx.drawImage(img,-w/2,-h/2-4,w,h);
    if(c.flash>0){ ctx.globalAlpha=alpha*c.flash*0.9; ctx.globalCompositeOperation='lighter';
      ctx.drawImage(SPRITES[sid],-w/2,-h/2-4,w,h); ctx.globalCompositeOperation='source-over'; }
  } else {
    drawBody(c);
  }
  ctx.restore();

  if(c.alive && !c.isSummon) drawBars(c);
}

// ---- sprites mignons (style chibi), dessinés sur `gx` ----
function drawBody(c){
  const hit=c.flash>0;
  const col=hit?'#fff':c.col, ac=hit?'#fff':c.ac, dk=hit?'#fff':shade(c.col,-42), lt=hit?'#fff':shade(c.col,28);
  const alive=c.alive!==false;
  const breathe=alive&&c.anim==='idle'?Math.sin(c.t*2)*0.03:0;
  gx.lineJoin='round'; gx.lineCap='round';

  // --- éléments DERRIÈRE le corps ---
  if(c.arch==='bird'){ const wf=Math.sin(c.t*5)*0.25;
    gx.fillStyle=dk; wing(-24,2,-1.0-wf); wing(24,2,1.0+wf); }
  if(c.arch==='serpent'){ gx.strokeStyle=col;gx.lineWidth=13;
    gx.beginPath();gx.moveTo(-2,30);gx.quadraticCurveTo(-28,28,-16,8);gx.stroke();
    gx.fillStyle=lt; dot(-16,10,5); }
  if(c.arch==='quad'){ gx.strokeStyle=col;gx.lineWidth=7;
    gx.beginPath();gx.moveTo(-22,18);gx.quadraticCurveTo(-42,10,-36,-12);gx.stroke();
    gx.fillStyle=ac; dot(-36,-14,5);
    gx.fillStyle=dk; foot(-13,30); foot(9,30); }
  if(c.arch==='golem'){ gx.fillStyle=dk; rr(-26,-14,9,16,3); rr(17,-14,9,16,3); } // bras-rochers

  // --- oreilles / cornes (derrière la tête) ---
  if(c.arch==='quad'){ gx.fillStyle=col; tri(-14,-26,10,16); tri(14,-26,10,16);
    gx.fillStyle='#ffb6c1'; tri(-14,-21,5,9); tri(14,-21,5,9); }
  if(c.arch==='serpent'){ gx.fillStyle=ac; tri(-7,-30,4,9); tri(7,-30,4,9); }
  if(c.arch==='golem'){ gx.fillStyle=dk; tri(-13,-27,7,13); tri(13,-27,7,13); }

  // --- CORPS (gros et rond, fusionné tête) ---
  const bw=30*(1+breathe), bh=32*(1+breathe);
  gx.fillStyle=col;
  if(c.arch==='golem'){ rr(-26,-26,52,54,14); } else { gx.beginPath();gx.ellipse(0,2,bw,bh,0,0,7);gx.fill(); }
  // ventre clair
  gx.fillStyle=ac; gx.beginPath();gx.ellipse(0,12,bw*0.62,bh*0.55,0,0,7);gx.fill();
  // pieds (sauf serpent/quad déjà)
  if(c.arch!=='serpent'&&c.arch!=='quad'){ gx.fillStyle=dk; foot(-13,31); foot(13,31); }

  // --- features DEVANT ---
  if(c.arch==='blob'){ gx.strokeStyle=col;gx.lineWidth=4;
    gx.beginPath();gx.moveTo(0,-30);gx.lineTo(2,-42);gx.stroke(); gx.fillStyle=ac; dot(3,-44,5); }
  if(c.arch==='bird'){ gx.fillStyle=ac; tri(0,-30,6,14); gx.fillStyle=lt; tri(-8,-27,4,9); tri(8,-27,4,9); }

  // --- GROS YEUX mignons ---
  const ex=11, ey=-3, er=8.5;
  gx.fillStyle='#fff'; dot(-ex,ey,er); dot(ex,ey,er);
  if(alive){
    gx.fillStyle='#2a2533'; dot(-ex+1.5,ey+1.5,5.2); dot(ex+1.5,ey+1.5,5.2);
    gx.fillStyle='#fff'; dot(-ex-1.5,ey-2,2.6); dot(ex-1.5,ey-2,2.6); // reflets
    gx.globalAlpha=.5; dot(-ex+3,ey+3.5,1.4); dot(ex+3,ey+3.5,1.4); gx.globalAlpha=1;
  } else { gx.strokeStyle='#4a4452';gx.lineWidth=2.4; cross(-ex,ey); cross(ex,ey); }
  // joues roses
  gx.fillStyle='rgba(255,120,150,.55)';
  gx.beginPath();gx.ellipse(-19,7,5,3.2,0,0,7);gx.fill();
  gx.beginPath();gx.ellipse(19,7,5,3.2,0,0,7);gx.fill();
  // bouche
  if(alive){
    if(c.arch==='bird'){ gx.fillStyle='#ffcf5a'; tri(0,11,5,7); }
    else { gx.strokeStyle=dk;gx.lineWidth=2;gx.beginPath();
      if(c.anim==='hit'||c.anim==='charge'){ gx.arc(0,8,5,0.05*Math.PI,0.95*Math.PI); } // bouche ouverte à l'attaque
      else { gx.arc(0,6,4.5,0.12*Math.PI,0.88*Math.PI); }
      gx.stroke(); }
  }

  // aura de boost
  if(c.boostT>0){ gx.globalAlpha=0.35+0.2*Math.sin(c.t*8); gx.strokeStyle='#bcd0ff';gx.lineWidth=2.5;
    gx.beginPath();gx.ellipse(0,4,bw+8,bh+8,0,0,7);gx.stroke();gx.globalAlpha=1; }
}
// shape helpers (draw on `gx`)
function blob(x,y,w,h){gx.beginPath();gx.ellipse(x,y,w/2,h/2,0,0,7);gx.fill();}
function rr(x,y,w,h,r){gx.beginPath();gx.roundRect(x,y,w,h,r);gx.fill();}
function dot(x,y,r){gx.beginPath();gx.arc(x,y,r,0,7);gx.fill();}
function tri(x,y,w,h){gx.beginPath();gx.moveTo(x,y-h);gx.lineTo(x-w,y);gx.lineTo(x+w,y);gx.closePath();gx.fill();}
function foot(x,y){gx.beginPath();gx.ellipse(x,y,9,5.5,0,0,7);gx.fill();}
function wing(x,y,rot){gx.save();gx.translate(x,y);gx.rotate(rot);gx.beginPath();gx.ellipse(0,0,15,9,0,0,7);gx.fill();gx.restore();}
function cross(x,y){gx.beginPath();gx.moveTo(x-4,y-4);gx.lineTo(x+4,y+4);gx.moveTo(x+4,y-4);gx.lineTo(x-4,y+4);gx.stroke();}

function drawBars(c){
  const sb=c.scaleBig||1, bw=70, bx=c.x-bw/2, by=c.baseY-58*sb-18;
  ctx.globalAlpha=1; ctx.textAlign='center';
  ctx.fillStyle='#cdd3e8';ctx.font='700 11px system-ui';
  ctx.fillText(c.name,c.x,by-5);
  // hp
  ctx.fillStyle='rgba(0,0,0,.5)';rr(bx-1,by-1,bw+2,9,4);
  const ratio=c.hp/c.maxHp, low=ratio<0.3;
  ctx.fillStyle=low?'#ff5a5a':'#5fd99a'; rr(bx,by,Math.max(0,bw*ratio),7,4);
  // gauge
  ctx.fillStyle='rgba(0,0,0,.4)';rr(bx,by+10,bw,3,2);
  ctx.fillStyle='#ffd24a';rr(bx,by+10,bw*(c.gauge/100),3,2);
  // type icons
  ctx.font='10px system-ui';ctx.textAlign='left';
  ctx.fillText(`${ATK[c.atk_t].ic}${DEF[c.def_t].ic}${SPE[c.spe_t]?SPE[c.spe_t].ic:''}`,bx,by+26);
}

function shade(hex,amt){const n=parseInt(hex.slice(1),16);let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}

/* ====================== LOOP ====================== */
function loop(now){
  let dt=Math.min(48,now-last); last=now;
  for(let i=0;i<speed;i++) update(dt);
  draw();
  requestAnimationFrame(loop);
}

/* ====================== UI: ROSTER PICK ====================== */
function renderRoster(){
  const grid=document.getElementById('critGrid'); grid.innerHTML='';
  const chosen=[];
  DEX.forEach(def=>{
    const card=document.createElement('div'); card.className='crit-card';
    card.innerHTML=`<canvas class="cv-mini" width="150" height="74"></canvas>
      <div class="cn">${def.name}</div>
      <div class="badges">
        <div class="badge"><span class="dotc" style="background:${ATK[def.atk_t].c}"></span>${ATK[def.atk_t].ic} <b>${ATK[def.atk_t].name}</b></div>
        <div class="badge"><span class="dotc" style="background:${DEF[def.def_t].c}"></span>${DEF[def.def_t].ic} <b>${DEF[def.def_t].name}</b></div>
        <div class="badge"><span class="dotc" style="background:${SPE[def.spe_t].c}"></span>${SPE[def.spe_t].ic} <b>${SPE[def.spe_t].name}</b></div>
      </div>`;
    card.onclick=()=>{
      const i=chosen.indexOf(def);
      if(i>=0){chosen.splice(i,1);card.classList.remove('sel');}
      else{ if(chosen.length>=2)return; chosen.push(def);card.classList.add('sel'); }
      document.getElementById('startBtn').disabled=chosen.length!==2;
    };
    grid.appendChild(card);
    // draw mini preview
    const mc=card.querySelector('.cv-mini'),mctx=mc.getContext('2d');
    drawMini(mctx,def);
  });
  document.getElementById('startBtn').onclick=()=>{
    roster=chosen.map((d,i)=>inst(d,'L',i));
    document.getElementById('rosterScreen').classList.add('hidden');
    nodeIdx=0; renderRunbar(); nextNode();
  };
}
function drawMini(g,def){
  g.clearRect(0,0,150,74);
  if(spriteReady(def.id)){
    const img=SPRITES[def.id], sc=Math.min(70/img.naturalHeight,140/img.naturalWidth);
    const w=img.naturalWidth*sc,h=img.naturalHeight*sc;
    g.drawImage(img,75-w/2,40-h/2,w,h); return;
  }
  const prev=gx; gx=g;
  g.save(); g.translate(75,50); g.scale(1.05,1.05);
  drawBody({col:def.col,ac:def.ac,arch:def.arch,flash:0,alive:true,boostT:0,t:performance.now()*0.002,facing:1});
  g.restore(); gx=prev;
}
// redessine les minis quand les sprites finissent de charger
DEX.forEach(d=>{ const s=SPRITES[d.id]; const prev=s.onload;
  s.onload=()=>{ if(prev)prev(); if(state==='roster')renderRoster(); }; });

/* runbar */
function renderRunbar(){
  const rb=document.getElementById('runbar'); rb.innerHTML='';
  RUN.forEach((n,i)=>{
    const d=document.createElement('div'); d.className='node'+(i===nodeIdx?' cur':i<nodeIdx?' done':'');
    d.textContent = n.t==='combat'?(n.boss?'👑':'⚔'):n.t==='perk'?'🌟':'❓';
    rb.appendChild(d);
  });
}

/* speed control */
const sc=document.getElementById('speedCtl');
[1,2,3].forEach(s=>{const b=document.createElement('button');b.className='ghost';b.textContent=s+'×';
  if(s===1)b.style.background='var(--acc)';
  b.onclick=()=>{speed=s;[...sc.children].forEach(x=>x.style.background='var(--panel2)');b.style.background='var(--acc)';};
  sc.appendChild(b);});

/* replay */
document.getElementById('replayBtn').onclick=()=>{
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('rosterScreen').classList.remove('hidden');
  document.getElementById('log').innerHTML='';
  state='roster'; renderRoster();
};

renderRoster(); renderRunbar();
requestAnimationFrame(loop);
</script>
