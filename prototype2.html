<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Battler — Prototype Combat Visuel</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#0d0f1a; color:#e8eaf2; font-family:-apple-system,system-ui,sans-serif; overflow:hidden; }
  #app { width:100vw; height:100vh; display:flex; flex-direction:column; align-items:center; }
  canvas { display:block; image-rendering:pixelated; background:#1a1d2e; border-radius:10px; box-shadow:0 10px 40px rgba(0,0,0,.5); }

  /* ---- Layout ---- */
  .screen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; transition:opacity .3s; }
  .hidden { opacity:0; pointer-events:none; }

  h1 { font-size:30px; letter-spacing:2px; text-shadow:0 2px 12px rgba(120,160,255,.4); }
  h2 { font-size:18px; color:#9aa3c7; font-weight:500; margin-bottom:6px; }
  .sub { color:#6f78a0; font-size:13px; }

  /* ---- Perk selection ---- */
  #perkScreen { background:radial-gradient(circle at 50% 30%, #1c2138, #0d0f1a); }
  .hero-pick { display:flex; align-items:center; gap:14px; margin-bottom:4px; }
  .hero-dot { width:34px; height:34px; border-radius:8px; }
  .perks-grid { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; max-width:760px; }
  .perk { width:210px; background:#191d33; border:2px solid #2a3050; border-radius:12px; padding:14px; cursor:pointer; transition:transform .12s, border-color .12s, box-shadow .12s; }
  .perk:hover { transform:translateY(-4px); border-color:#5b7cff; box-shadow:0 8px 24px rgba(91,124,255,.25); }
  .perk.sel { border-color:#5b7cff; box-shadow:0 0 0 2px #5b7cff inset, 0 8px 24px rgba(91,124,255,.3); }
  .perk .pname { font-size:15px; font-weight:700; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
  .perk .pdesc { font-size:12px; color:#9aa3c7; line-height:1.5; }
  .tag { font-size:10px; padding:2px 7px; border-radius:6px; font-weight:700; text-transform:uppercase; }
  .tag.stat{background:#1f3a2a;color:#5fd99a} .tag.behav{background:#3a2f1f;color:#e0b24a} .tag.power{background:#3a1f3a;color:#d97ad9}

  button { font:inherit; font-weight:700; padding:12px 28px; border:none; border-radius:10px; cursor:pointer;
           background:linear-gradient(#5b7cff,#3f59d6); color:#fff; letter-spacing:.5px; transition:transform .1s, filter .1s; }
  button:hover { filter:brightness(1.1); transform:translateY(-2px); }
  button:disabled { opacity:.4; cursor:default; transform:none; }
  button.ghost { background:#23284a; }

  /* ---- Combat log ---- */
  #log { position:absolute; bottom:14px; left:14px; width:300px; max-height:120px; overflow:hidden;
         font-size:12px; color:#8b93bb; pointer-events:none; }
  #log div { opacity:0; animation:logIn .4s forwards; }
  @keyframes logIn { from{opacity:0;transform:translateX(-8px)} to{opacity:.9;transform:none} }

  #speedCtl { position:absolute; top:14px; right:14px; display:flex; gap:6px; }
  #speedCtl button { padding:6px 12px; font-size:12px; background:#23284a; }
  #speedCtl button.on { background:#5b7cff; }

  #result { font-size:40px; font-weight:800; text-shadow:0 4px 20px rgba(0,0,0,.6); }
</style>
</head>
<body>
<div id="app">
  <canvas id="cv" width="900" height="520"></canvas>

  <!-- PERK SELECTION -->
  <div id="perkScreen" class="screen">
    <h1>⚔️ Choisis tes Perks</h1>
    <p class="sub">Chaque héros choisit 1 perk. Ils modifient stats, comportement et pouvoirs.</p>
    <div id="perkPicker"></div>
    <button id="startBtn" disabled>Lancer le combat</button>
  </div>

  <!-- COMBAT -->
  <div id="combatScreen" class="screen hidden">
    <div id="speedCtl"></div>
    <div id="log"></div>
  </div>

  <!-- RESULT -->
  <div id="resultScreen" class="screen hidden">
    <div id="result"></div>
    <button id="replayBtn">Rejouer</button>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;

/* ============ DONNÉES ============ */
const PERKS = [
  { id:'force',   name:'Force Brute',    type:'stat',  desc:'+40% dégâts, mais -15% vitesse.', icon:'💪',
    apply:c=>{c.atk*=1.4; c.spd*=0.85;} },
  { id:'agilite', name:'Agilité',        type:'stat',  desc:'+50% vitesse d\'action, +20% esquive.', icon:'🌀',
    apply:c=>{c.spd*=1.5; c.dodge+=0.20;} },
  { id:'colosse', name:'Colosse',        type:'stat',  desc:'+60% PV max, -20% dégâts.', icon:'🛡️',
    apply:c=>{c.maxHp=Math.round(c.maxHp*1.6); c.hp=c.maxHp; c.atk*=0.8;} },
  { id:'double',  name:'Double Assaut',  type:'behav', desc:'25% de chance de frapper deux fois.', icon:'⚡',
    apply:c=>{c.doubleStrike=0.25;} },
  { id:'parade',  name:'Parade',         type:'behav', desc:'30% de bloquer une attaque (contre).', icon:'✋',
    apply:c=>{c.parry=0.30;} },
  { id:'esquive', name:'Esquive Féline', type:'behav', desc:'+35% d\'éviter totalement une attaque.', icon:'💨',
    apply:c=>{c.dodge+=0.35;} },
  { id:'rage',    name:'Rage',           type:'power', desc:'Sous 40% PV : +60% dégâts (mode berserk).', icon:'🔥',
    apply:c=>{c.rage=true;} },
  { id:'vampire', name:'Soif de Sang',   type:'power', desc:'Soigne 35% des dégâts infligés.', icon:'🩸',
    apply:c=>{c.lifesteal=0.35;} },
  { id:'foudre',  name:'Frappe Foudre',  type:'power', desc:'20% : éclair qui ignore la défense.', icon:'⚡',
    apply:c=>{c.lightning=0.20;} },
];

function mkHero(name, color, x, hp, atk, def, spd){
  return { name, color, baseX:x, x, y:H/2+40, hp, maxHp:hp, atk, def, spd,
    dodge:0, parry:0, doubleStrike:0, rage:false, lifesteal:0, lightning:0,
    gauge:0, side:null, perk:null,
    // anim
    anim:'idle', animT:0, lunge:0, bob:Math.random()*6, flash:0, facing:1, scaleX:1, scaleY:1, deadT:0, alive:true };
}

let player=[], enemy=[], all=[];
function buildTeams(){
  player = [
    mkHero('Garde',   '#5b9cff', 200, 120, 16, 6, 1.0),
    mkHero('Lame',    '#7ad9d9', 130, 90,  22, 3, 1.4),
  ];
  enemy = [
    mkHero('Brute',   '#ff6b6b', 700, 130, 18, 5, 0.9),
    mkHero('Rôdeur',  '#ffb24a', 770, 85,  20, 3, 1.3),
  ];
  player.forEach(h=>{h.side='L'; h.facing=1;});
  enemy.forEach(h=>{h.side='R'; h.facing=-1;});
  all=[...player,...enemy];
}

/* ============ PERK SELECTION UI ============ */
const picker = document.getElementById('perkPicker');
const startBtn = document.getElementById('startBtn');
let pickFor=[]; // heroes needing a perk

function renderPicker(){
  buildTeams();
  picker.innerHTML='';
  pickFor = player; // joueur choisit pour ses 2 héros
  pickFor.forEach((h,hi)=>{
    const wrap=document.createElement('div');
    wrap.innerHTML=`<div class="hero-pick"><div class="hero-dot" style="background:${h.color}"></div>
      <div><b>${h.name}</b><div class="sub">${h.maxHp} PV · ${h.atk} ATK · vit ${h.spd}</div></div></div>`;
    const grid=document.createElement('div'); grid.className='perks-grid';
    // 3 perks aléatoires proposés par héros
    const pool=[...PERKS].sort(()=>Math.random()-0.5).slice(0,3);
    pool.forEach(p=>{
      const card=document.createElement('div'); card.className='perk';
      card.innerHTML=`<div class="pname">${p.icon} ${p.name} <span class="tag ${p.type}">${p.type==='stat'?'Stat':p.type==='behav'?'Comport.':'Pouvoir'}</span></div>
        <div class="pdesc">${p.desc}</div>`;
      card.onclick=()=>{
        grid.querySelectorAll('.perk').forEach(e=>e.classList.remove('sel'));
        card.classList.add('sel'); h.perk=p; checkReady();
      };
      grid.appendChild(card);
    });
    wrap.appendChild(grid);
    picker.appendChild(wrap);
  });
  // ennemis : perks aléatoires
  enemy.forEach(h=>{ h.perk = PERKS[Math.floor(Math.random()*PERKS.length)]; });
}
function checkReady(){ startBtn.disabled = !pickFor.every(h=>h.perk); }

function applyPerks(){
  all.forEach(h=>{ if(h.perk) h.perk.apply(h); });
}

/* ============ COMBAT ============ */
let state='perk', winner=null, hitPause=0, shake=0, particles=[], floaters=[];
let speed=1;

function log(msg){
  const el=document.getElementById('log');
  const d=document.createElement('div'); d.textContent=msg; el.prepend(d);
  while(el.childNodes.length>6) el.removeChild(el.lastChild);
}

function startCombat(){
  applyPerks();
  document.getElementById('perkScreen').classList.add('hidden');
  document.getElementById('combatScreen').classList.remove('hidden');
  state='fight'; winner=null; particles=[]; floaters=[];
  log('⚔️ Le combat commence !');
}

function aliveEnemiesOf(h){ return (h.side==='L'?enemy:player).filter(e=>e.alive); }

function performAttack(att){
  const foes=aliveEnemiesOf(att); if(!foes.length) return;
  const tgt=foes[Math.floor(Math.random()*foes.length)];
  att.target=tgt;
  att.anim='windup'; att.animT=0;
}

function resolveHit(att, tgt, isLightning){
  if(!tgt.alive){ return; }
  // esquive
  if(!isLightning && Math.random()<tgt.dodge){
    floater(tgt,'Esquive!','#7ad9d9'); log(`${tgt.name} esquive ${att.name} !`);
    tgt.anim='dodge'; tgt.animT=0; return;
  }
  // parade / contre
  if(!isLightning && Math.random()<tgt.parry){
    floater(tgt,'Parade!','#ffe08a'); log(`${tgt.name} pare et contre !`);
    tgt.anim='parry'; tgt.animT=0; tgt.flash=1;
    spawnParticles((att.x+tgt.x)/2,(att.y+tgt.y)/2,'#ffe08a',10);
    // contre-dégâts
    const cd=Math.max(2,Math.round(tgt.atk*0.5));
    dealDamage(att, cd, false);
    return;
  }
  // dégâts
  let dmg=att.atk;
  if(att.rage && att.hp < att.maxHp*0.4) dmg*=1.6;
  if(!isLightning) dmg=Math.max(2, dmg - tgt.def);
  dmg=Math.round(dmg*(0.85+Math.random()*0.3));
  dealDamage(tgt, dmg, isLightning, att);
  // lifesteal
  if(att.lifesteal>0){
    const heal=Math.round(dmg*att.lifesteal);
    att.hp=Math.min(att.maxHp, att.hp+heal);
    floater(att,'+'+heal,'#5fd99a');
  }
}

function dealDamage(tgt, dmg, isLightning, att){
  tgt.hp-=dmg; tgt.flash=1; tgt.anim='hurt'; tgt.animT=0;
  // knockback
  tgt.x += (tgt.side==='L'?-1:1)*8;
  floater(tgt,'-'+dmg, isLightning?'#d97ad9':'#ff7a7a', isLightning);
  spawnParticles(tgt.x,tgt.y-30, isLightning?'#d97ad9':'#ff5a5a', isLightning?16:8);
  hitPause=isLightning?7:4; shake=isLightning?10:6;
  if(tgt.hp<=0){ tgt.hp=0; tgt.alive=false; tgt.anim='die'; tgt.animT=0; tgt.deadT=0;
    log(`💀 ${tgt.name} est vaincu !`); }
}

function floater(h,text,color,big){ floaters.push({x:h.x+(Math.random()*20-10),y:h.y-50,text,color,t:0,big:!!big}); }
function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, s=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,color,r:2+Math.random()*3}); }
}

/* ============ UPDATE ============ */
let last=performance.now();
function update(dt){
  if(state!=='fight') { updateFx(dt); return; }
  if(hitPause>0){ hitPause-=1; updateFx(dt); return; }

  all.forEach(h=>{
    h.bob += dt*0.005;
    if(h.flash>0) h.flash=Math.max(0,h.flash-dt*0.006);
    h.animT += dt;

    if(!h.alive){ h.deadT+=dt; return; }

    // gauge fills
    if(h.anim==='idle'){
      h.gauge += h.spd * dt*0.018;
      if(h.gauge>=100){ h.gauge=0; performAttack(h); }
    }
    stepAnim(h, dt);
  });

  // win check
  if(!player.some(h=>h.alive)){ endCombat('enemy'); }
  else if(!enemy.some(h=>h.alive)){ endCombat('player'); }

  updateFx(dt);
}

function stepAnim(h, dt){
  const tgt=h.target;
  switch(h.anim){
    case 'windup':
      // anticipation : recule + squash
      h.lunge = Math.min(h.lunge+dt*0.02, 1);
      h.scaleX=1+0.15*h.lunge; h.scaleY=1-0.12*h.lunge;
      if(h.animT>180){ h.anim='dash'; h.animT=0; }
      break;
    case 'dash':{
      if(!tgt||!tgt.alive){ h.anim='return'; h.animT=0; break; }
      const dest = tgt.x - h.facing*55;
      h.x += (dest-h.x)*Math.min(1,dt*0.02);
      h.scaleX=1.1; h.scaleY=0.92;
      if(Math.abs(h.x-dest)<8){
        h.anim='strike'; h.animT=0;
        resolveHit(h,tgt,false);
        // double strike
        if(Math.random()<h.doubleStrike){ floater(h,'x2','#ffe08a'); setTimeout(()=>{ if(tgt.alive) resolveHit(h,tgt,false); }, 120); }
        // lightning power
        if(Math.random()<h.lightning){ floater(h,'⚡','#d97ad9'); resolveHit(h,tgt,true); }
      }
      break; }
    case 'strike':
      h.scaleX=1.2; h.scaleY=0.85;
      if(h.animT>120){ h.anim='return'; h.animT=0; }
      break;
    case 'return':
      h.x += (h.baseX-h.x)*Math.min(1,dt*0.012);
      h.scaleX += (1-h.scaleX)*0.2; h.scaleY += (1-h.scaleY)*0.2; h.lunge*=0.8;
      if(Math.abs(h.x-h.baseX)<4){ h.x=h.baseX; h.anim='idle'; h.animT=0; }
      break;
    case 'hurt':
      h.scaleX += (1-h.scaleX)*0.2; h.scaleY += (1-h.scaleY)*0.2;
      h.x += (h.baseX-h.x)*0.15;
      if(h.animT>200){ h.anim='idle'; }
      break;
    case 'dodge':
      h.y = H/2+40 - Math.sin(Math.min(1,h.animT/250)*Math.PI)*22;
      if(h.animT>250){ h.y=H/2+40; h.anim='idle'; }
      break;
    case 'parry':
      h.scaleX += (1.1-h.scaleX)*0.2;
      if(h.animT>200){ h.scaleX=1; h.anim='idle'; }
      break;
  }
}

function updateFx(dt){
  if(shake>0) shake=Math.max(0,shake-dt*0.04);
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.35; p.life-=dt*0.004; });
  particles=particles.filter(p=>p.life>0);
  floaters.forEach(f=>{ f.t+=dt; f.y-=dt*0.03; });
  floaters=floaters.filter(f=>f.t<900);
}

function endCombat(who){
  if(state!=='fight') return;
  state='done'; winner=who;
  setTimeout(()=>{
    document.getElementById('combatScreen').classList.add('hidden');
    const rs=document.getElementById('resultScreen'); rs.classList.remove('hidden');
    const r=document.getElementById('result');
    r.textContent = who==='player' ? '🏆 Victoire !' : '☠️ Défaite';
    r.style.color = who==='player' ? '#5fd99a' : '#ff6b6b';
  }, 900);
}

/* ============ RENDER ============ */
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake>0) ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);

  // arena
  drawArena();

  // shadows + sprites (sorted by y)
  const drawn=[...all].sort((a,b)=>a.y-b.y);
  drawn.forEach(drawShadow);
  drawn.forEach(drawHero);

  // particles
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill();
  });
  ctx.globalAlpha=1;

  // floaters
  floaters.forEach(f=>{
    ctx.globalAlpha=Math.max(0,1-f.t/900);
    ctx.fillStyle=f.color; ctx.font=`800 ${f.big?28:20}px system-ui`;
    ctx.textAlign='center'; ctx.fillText(f.text,f.x,f.y);
  });
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawArena(){
  // ground
  const g=ctx.createLinearGradient(0,H/2,0,H);
  g.addColorStop(0,'#252a44'); g.addColorStop(1,'#161930');
  ctx.fillStyle=g; ctx.fillRect(0,H/2+10,W,H);
  // floor line
  ctx.strokeStyle='rgba(120,140,220,.15)'; ctx.lineWidth=2;
  for(let i=0;i<8;i++){ ctx.beginPath(); ctx.moveTo(0,H/2+30+i*30); ctx.lineTo(W,H/2+30+i*30); ctx.stroke(); }
}

function drawShadow(h){
  if(!h.alive && h.deadT>400) return;
  ctx.save(); ctx.globalAlpha=h.alive?0.3:0.3*Math.max(0,1-h.deadT/400);
  ctx.fillStyle='#000'; ctx.beginPath();
  ctx.ellipse(h.x, h.y+38, 26*h.scaleX, 8, 0,0,7); ctx.fill(); ctx.restore();
}

function drawHero(h){
  ctx.save();
  let alpha=1, yoff=0, rot=0;
  if(!h.alive){ const t=Math.min(1,h.deadT/500); alpha=1-t; yoff=t*30; rot=t*(h.side==='L'?-0.6:0.6); }
  ctx.globalAlpha=alpha;
  const bob = h.alive && h.anim==='idle' ? Math.sin(h.bob)*3 : 0;
  ctx.translate(h.x, h.y+yoff+bob); ctx.rotate(rot);
  ctx.scale(h.facing*h.scaleX, h.scaleY);

  const c=h.color;
  const hit = h.flash>0;
  const body = hit ? '#ffffff' : c;
  const dark = hit ? '#ffffff' : shade(c,-30);

  // legs (walk bob when moving)
  const moving = h.anim==='dash'||h.anim==='return';
  const legSwing = moving ? Math.sin(h.animT*0.03)*6 : 0;
  ctx.fillStyle=dark;
  rrect(-12, 14, 9, 22+legSwing, 3);
  rrect(3, 14, 9, 22-legSwing, 3);
  // body
  ctx.fillStyle=body;
  rrect(-16,-18,32,38,7);
  // belt
  ctx.fillStyle=shade(c,-40); rrect(-16,8,32,5,2);
  // head
  ctx.fillStyle = hit?'#fff':'#f0d9b8';
  ctx.beginPath(); ctx.arc(0,-30,12,0,7); ctx.fill();
  // helmet
  ctx.fillStyle=body; ctx.beginPath(); ctx.arc(0,-32,12,Math.PI,0); ctx.fill();
  rrect(-12,-34,24,5,2);
  // eyes
  if(h.alive){ ctx.fillStyle='#222';
    ctx.fillRect(-6,-30,3,4); ctx.fillRect(3,-30,3,4); }
  // arm / weapon (animate on strike)
  const armUp = (h.anim==='windup')?-0.6 : (h.anim==='strike'?0.7:(h.anim==='dash'?-0.3:0));
  ctx.save(); ctx.translate(14,-8); ctx.rotate(armUp);
  ctx.fillStyle=dark; rrect(-3,0,7,20,3);          // arm
  ctx.fillStyle=hit?'#fff':'#cdd3e8'; rrect(0,-26,5,30,2); // sword blade
  ctx.fillStyle=shade(c,-50); rrect(-4,-2,13,5,2);  // guard
  ctx.restore();
  // shield arm
  ctx.fillStyle=shade(c,-20); ctx.beginPath(); ctx.ellipse(-16,2,7,12,0,0,7); ctx.fill();

  ctx.restore();

  // ---- UI above head (no transform) ----
  if(h.alive){
    drawBars(h);
  }
}

function drawBars(h){
  const bw=64, bx=h.x-bw/2, by=h.y-70;
  // name
  ctx.globalAlpha=1; ctx.fillStyle='#cdd3e8'; ctx.font='700 11px system-ui'; ctx.textAlign='center';
  ctx.fillText(h.name + (h.perk?' '+h.perk.icon:''), h.x, by-6);
  // hp bg
  ctx.fillStyle='#000'; ctx.globalAlpha=.4; rrect(bx,by,bw,8,4); ctx.globalAlpha=1;
  const hpw=bw*(h.hp/h.maxHp);
  const low=h.hp/h.maxHp<0.3;
  ctx.fillStyle=low?'#ff5a5a':'#5fd99a'; rrect(bx,by,Math.max(0,hpw),8,4);
  // gauge (action)
  ctx.fillStyle='#000'; ctx.globalAlpha=.35; rrect(bx,by+10,bw,4,2); ctx.globalAlpha=1;
  ctx.fillStyle='#ffd24a'; rrect(bx,by+10,bw*(h.gauge/100),4,2);
}

/* helpers */
function rrect(x,y,w,h,r){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.fill(); }
function shade(hex,amt){ const n=parseInt(hex.slice(1),16); let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }

/* ============ LOOP ============ */
function loop(now){
  let dt=Math.min(50, now-last); last=now;
  for(let i=0;i<speed;i++) update(dt);
  draw();
  requestAnimationFrame(loop);
}

/* ============ SPEED CONTROL ============ */
const sc=document.getElementById('speedCtl');
[1,2,4].forEach(s=>{ const b=document.createElement('button'); b.textContent=s+'x';
  if(s===1)b.classList.add('on');
