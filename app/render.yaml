services:
  - type: web
    name: auto-battler
    runtime: node
    plan: free
    rootDir: app
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_EMAIL
        value: admin@autobattler.local
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_USERNAME
        value: admin
